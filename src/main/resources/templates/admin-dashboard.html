<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(view='admin-dashboard')}">
<head>
    <title>Tổng quan - Quản trị</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0 text-gray-800">Tổng quan hệ thống</h2>
    </div>

    <!-- Data Summary Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-3 h-100">
                <div class="card-body">
                    <p class="text-uppercase text-muted small fw-bold mb-1" style="letter-spacing: 0.05em;">Tổng Sản Phẩm</p>
                    <h3 class="fw-normal mb-0 text-dark" th:text="${totalProducts}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-3 h-100">
                <div class="card-body">
                    <p class="text-uppercase text-muted small fw-bold mb-1" style="letter-spacing: 0.05em;">Tổng Đơn Hàng</p>
                    <h3 class="fw-normal mb-0 text-dark" th:text="${totalOrders}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-3 h-100">
                <div class="card-body">
                    <p class="text-uppercase text-muted small fw-bold mb-1" style="letter-spacing: 0.05em;">Doanh Thu</p>
                    <h3 class="fw-normal mb-0 text-success" th:text="${#numbers.formatInteger(totalRevenue, 1, 'POINT')} + 'đ'">0đ</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-3 h-100">
                <div class="card-body">
                    <p class="text-uppercase text-muted small fw-bold mb-1" style="letter-spacing: 0.05em;">Đánh Giá</p>
                    <h3 class="fw-normal mb-0 text-dark" th:text="${totalReviews}">0</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-3 h-100">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                    <h5 class="h6 mb-0 text-gray-800 fw-bold">Sản phẩm bán chạy nhất</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="border-0 small text-muted text-uppercase" style="letter-spacing: 0.05em;">Sản phẩm</th>
                                <th class="border-0 small text-muted text-uppercase text-end" style="letter-spacing: 0.05em;">Lượt bán</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${topProducts}">
                                <td class="border-bottom text-dark" th:text="${p.name}">Product</td>
                                <td class="border-bottom fw-medium text-end" th:text="${p.salesCount} ? ${p.salesCount} : '0'">0</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-3 h-100">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                    <h5 class="h6 mb-0 text-gray-800 fw-bold">Đơn hàng mới nhất</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="border-0 small text-muted text-uppercase" style="letter-spacing: 0.05em;">Mã đơn</th>
                                <th class="border-0 small text-muted text-uppercase" style="letter-spacing: 0.05em;">Tổng</th>
                                <th class="border-0 small text-muted text-uppercase text-end" style="letter-spacing: 0.05em;">Trạng thái</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="o : ${latestOrders}">
                                <td class="border-bottom">
                                    <span class="text-primary fw-medium">#<span th:text="${o.id}">1</span></span>
                                    <div class="small text-muted" th:text="${o.username}">user</div>
                                </td>
                                <td class="border-bottom text-dark" th:text="${#numbers.formatInteger(o.totalPrice, 1, 'POINT')} + 'đ'">0đ</td>
                                <td class="border-bottom text-end">
                                    <span class="badge rounded-pill bg-light border text-dark fw-normal px-2" th:text="${o.status}">PENDING</span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-body">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-body">
                    <canvas id="ordersChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        // Revenue Chart
        const ctx1 = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: [[${months}]],
                datasets: [{
                    label: 'Doanh thu (đ)',
                    data: [[${monthlyRevenue}]],
                    borderColor: '#1a1a1a',
                    backgroundColor: 'rgba(26, 26, 26, 0.05)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    title: {
                        display: true,
                        text: 'Biểu đồ doanh thu hàng tháng',
                        font: { family: 'Inter, sans-serif', weight: 'normal', size: 14 }
                    }
                },
                scales: {
                    y: { border: { display: false }, grid: { color: '#f0f0f0' } },
                    x: { border: { display: false }, grid: { display: false } }
                }
            }
        });

        // Orders Chart
        const ctx2 = document.getElementById('ordersChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: [[${months}]],
                datasets: [{
                    label: 'Số đơn hàng',
                    data: [[${monthlyOrders}]],
                    backgroundColor: '#e0e0e0',
                    borderRadius: 4,
                    borderWidth: 0,
                    barThickness: 24
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    title: {
                        display: true,
                        text: 'Biểu đồ Đơn hàng',
                        font: { family: 'Inter, sans-serif', weight: 'normal', size: 14 }
                    }
                },
                scales: {
                    y: { border: { display: false }, grid: { color: '#f0f0f0' } },
                    x: { border: { display: false }, grid: { display: false } }
                }
            }
        });
        /*]]>*/
    </script>
</th:block>
</body>
</html>
