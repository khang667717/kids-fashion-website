<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(view='admin-product-form')}">
<head>
    <title th:if="${product.id == null}">Thêm sản phẩm</title>
    <title th:if="${product.id != null}">Sửa sản phẩm</title>
</head>
<body>
<th:block th:fragment="content">
    <h1 th:if="${product.id == null}">Thêm sản phẩm</h1>
    <h1 th:if="${product.id != null}">Sửa sản phẩm</h1>

    <!-- Hiển thị thông báo -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form method="post" th:action="@{/admin/products/save}" enctype="multipart/form-data">
        <input type="hidden" name="id" th:value="${product.id}">

        <div class="mb-3">
            <label for="name" class="form-label">Tên sản phẩm</label>
            <input type="text" class="form-control" id="name" name="name" th:value="${product.name}" required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Mô tả</label>
            <textarea class="form-control" id="description" name="description" rows="3" required
                      th:text="${product.description}"></textarea>
        </div>

        <div class="mb-3">
            <label for="price" class="form-label">Giá</label>
            <input type="number" step="0.01" class="form-control" id="price" name="price" th:value="${product.price}" required>
        </div>

        <div class="mb-3">
            <label for="stock" class="form-label">Tồn kho</label>
            <input type="number" class="form-control" id="stock" name="stock" th:value="${product.stock}" required>
        </div>

        <div class="mb-3">
            <label for="categoryId" class="form-label">Danh mục</label>
            <select class="form-select" id="categoryId" name="categoryId" required>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == product.categoryId}"></option>
            </select>
        </div>

        <!-- Thêm phần chọn size -->
        <div class="mb-3">
            <label class="form-label">Kích thước có sẵn</label>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="sizes" value="S" id="sizeS"
                       th:checked="${product.sizes != null && product.sizes.contains('S')}">
                <label class="form-check-label" for="sizeS">S</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="sizes" value="M" id="sizeM"
                       th:checked="${product.sizes != null && product.sizes.contains('M')}">
                <label class="form-check-label" for="sizeM">M</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="sizes" value="L" id="sizeL"
                       th:checked="${product.sizes != null && product.sizes.contains('L')}">
                <label class="form-check-label" for="sizeL">L</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="sizes" value="XL" id="sizeXL"
                       th:checked="${product.sizes != null && product.sizes.contains('XL')}">
                <label class="form-check-label" for="sizeXL">XL</label>
            </div>
        </div>

        <!-- PHẦN UPLOAD ẢNH ĐÃ ĐƯỢC CẢI THIỆN -->
        <div class="mb-3">
            <label for="imageFile" class="form-label">Ảnh sản phẩm</label>
            <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*">

            <!-- Hiển thị ảnh hiện tại với fallback -->
            <div th:if="${product.imageUrl}" class="mt-3 p-3 border rounded">
                <div class="d-flex align-items-center">
                    <div class="me-3">
                        <strong>Ảnh hiện tại:</strong>
                    </div>
                    <div>
                        <img th:src="${product.imageUrl}"
                             width="150"
                             class="img-thumbnail"
                             alt="Product image"
                             onerror="this.onerror=null; this.src='https://via.placeholder.com/150?text=No+Image';">
                    </div>
                </div>
                <small class="text-muted d-block mt-2">
                    <i class="fas fa-info-circle"></i>
                    Để trống để giữ ảnh hiện tại. Tải ảnh mới lên để thay thế.
                </small>
            </div>

            <!-- Hiển thị thông báo nếu chưa có ảnh -->
            <div th:if="${product.imageUrl == null}" class="mt-2 p-3 bg-light rounded">
                <small class="text-muted">
                    <i class="fas fa-info-circle"></i>
                    Chưa có ảnh. Tải ảnh mới lên.
                </small>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a href="/admin/products" class="btn btn-secondary">Hủy</a>
    </form>
</th:block>
</body>
</html>
