<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(view='admin-user-form')}">
<head>
    <title th:if="${user.id == null}">Thêm người dùng</title>
    <title th:if="${user.id != null}">Sửa người dùng</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="card">
        <div class="card-header">
            <h3 th:if="${user.id == null}">
                <i class="fas fa-user-plus me-2"></i>Thêm người dùng mới
            </h3>
            <h3 th:if="${user.id != null}">
                <i class="fas fa-user-edit me-2"></i>Sửa người dùng: <span th:text="${user.username}"></span>
            </h3>
        </div>
        <div class="card-body">
            <form method="post" th:action="@{/admin/users/save}">
                <input type="hidden" name="id" th:value="${user.id}">

                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="fas fa-user me-1"></i>Tên đăng nhập <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" id="username" name="username"
                           th:value="${user.username}" required
                           placeholder="Nhập tên đăng nhập">
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope me-1"></i>Email <span class="text-danger">*</span>
                    </label>
                    <input type="email" class="form-control" id="email" name="email"
                           th:value="${user.email}" required
                           placeholder="Nhập địa chỉ email">
                </div>

                <!-- ===== PHẦN PASSWORD CHO EDIT USER ===== -->
                <div th:if="${user.id != null}" class="mb-3">
                    <div class="form-check mb-2">
                        <!-- THÊM name="changePassword" VÀ value="true" -->
                        <input class="form-check-input" type="checkbox" id="changePasswordCheck"
                               name="changePassword" value="true">
                        <label class="form-check-label fw-bold" for="changePasswordCheck">
                            <i class="fas fa-key me-1 text-warning"></i>Đổi mật khẩu
                        </label>
                    </div>

                    <div id="passwordFields" style="display: none;">
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock me-1"></i>Mật khẩu mới <span class="text-danger">*</span>
                            </label>
                            <!-- KHÔNG required ở đây vì sẽ set bằng JS -->
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Nhập mật khẩu mới" minlength="6">
                            <div class="form-text">
                                <i class="fas fa-info-circle text-info me-1"></i>
                                Mật khẩu phải có ít nhất 6 ký tự
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">
                                <i class="fas fa-lock me-1"></i>Xác nhận mật khẩu mới <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-control" id="confirmPassword"
                                   placeholder="Nhập lại mật khẩu mới">
                        </div>
                    </div>

                    <!-- Message khi không đổi password -->
                    <div id="keepPasswordMessage" class="alert alert-info py-2">
                        <i class="fas fa-info-circle me-2"></i>
                        Mật khẩu hiện tại sẽ được giữ. Tick "Đổi mật khẩu" để đặt mật khẩu mới.
                    </div>
                </div>

                <!-- ===== PHẦN PASSWORD CHO ADD NEW USER ===== -->
                <div th:if="${user.id == null}" class="mb-3">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock me-1"></i>Mật khẩu <span class="text-danger">*</span>
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                           required placeholder="Nhập mật khẩu" minlength="6">
                    <div class="form-text">
                        <i class="fas fa-info-circle text-info me-1"></i>
                        Mật khẩu phải có ít nhất 6 ký tự
                    </div>
                </div>

                <!-- Confirm Password cho Add New User -->
                <div th:if="${user.id == null}" class="mb-3">
                    <label for="confirmPassword" class="form-label">
                        <i class="fas fa-lock me-1"></i>Xác nhận mật khẩu <span class="text-danger">*</span>
                    </label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           required placeholder="Nhập lại mật khẩu">
                </div>

                <!-- Role -->
                <div class="mb-3">
                    <label for="role" class="form-label">
                        <i class="fas fa-tag me-1"></i>Vai trò <span class="text-danger">*</span>
                    </label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="ROLE_CUSTOMER" th:selected="${user.role == 'ROLE_CUSTOMER'}">
                            Khách hàng
                        </option>
                        <option value="ROLE_ADMIN" th:selected="${user.role == 'ROLE_ADMIN'}">
                            Quản trị viên
                        </option>
                    </select>
                    <div class="form-text">
                        <i class="fas fa-info-circle text-info me-1"></i>
                        Quản trị viên có toàn quyền quản lý. Khách hàng chỉ có thể xem và mua sản phẩm.
                    </div>
                </div>

                <!-- Thông tin thêm khi sửa -->
                <div class="mb-3" th:if="${user.id != null}">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>
                        <strong>User ID:</strong> <span th:text="${user.id}"></span> |
                        <strong>Created:</strong> <span th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Lưu người dùng
                    </button>
                    <a href="/admin/users" class="btn btn-secondary">
                        <i class="fas fa-times me-2"></i>Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript cho Change Password (EDIT USER) -->
    <script th:if="${user.id != null}">
        document.addEventListener('DOMContentLoaded', function() {
            const changePasswordCheck = document.getElementById('changePasswordCheck');
            const passwordFields = document.getElementById('passwordFields');
            const keepPasswordMessage = document.getElementById('keepPasswordMessage');
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const form = document.querySelector('form');

            // Xử lý hiển thị/ẩn password fields
            changePasswordCheck.addEventListener('change', function() {
                if (this.checked) {
                    passwordFields.style.display = 'block';
                    keepPasswordMessage.style.display = 'none';
                    passwordInput.required = true;
                } else {
                    passwordFields.style.display = 'none';
                    keepPasswordMessage.style.display = 'block';
                    passwordInput.required = false;
                    passwordInput.value = '';
                    confirmInput.value = '';
                }
            });

            // Kiểm tra password match khi submit
            form.addEventListener('submit', function(e) {
                if (changePasswordCheck && changePasswordCheck.checked) {
                    const password = passwordInput.value;
                    const confirmPassword = confirmInput.value;

                    if (!password || password.length < 6) {
                        e.preventDefault();
                        alert('Mật khẩu phải có ít nhất 6 ký tự!');
                        return;
                    }

                    if (password !== confirmPassword) {
                        e.preventDefault();
                        alert('Mật khẩu không khớp!');
                        return;
                    }
                }
            });
        });
    </script>

    <!-- JavaScript cho Add New User -->
    <script th:if="${user.id == null}">
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Mật khẩu không khớp!');
                return;
            }

            if (password.length < 6) {
                e.preventDefault();
                alert('Mật khẩu phải có ít nhất 6 ký tự!');
                return;
            }
        });
    </script>
</th:block>
</body>
</html>
