<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(view='admin-category-form')}">
<head>
    <title th:if="${category.id == null}">Thêm danh mục</title>
    <title th:if="${category.id != null}">Sửa danh mục</title>
</head>
<body>
<th:block th:fragment="content">
    <h1 th:if="${category.id == null}">Thêm danh mục</h1>
    <h1 th:if="${category.id != null}">Sửa danh mục</h1>
    <form method="post" th:action="@{/admin/categories/save}">
        <input type="hidden" name="id" th:value="${category.id}">
        <div class="mb-3">
            <label for="name" class="form-label">Tên</label>
            <input type="text" class="form-control" id="name" name="name" th:value="${category.name}" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Mô tả</label>
            <textarea class="form-control" id="description" name="description" rows="3" th:text="${category.description}"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Lưu</button>
        <a href="/admin/categories" class="btn btn-secondary">Hủy</a>
    </form>
</th:block>
</body>
</html>
