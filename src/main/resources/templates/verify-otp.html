<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(view='verify-otp')}">

<head>
    <title>Xác thực OTP - Kids Fashion</title>
</head>

<body>
    <th:block th:fragment="content">

        <!-- Inject email from server -->
        <div id="serverEmail" th:data-email="${email}" style="display:none;"></div>

        <!-- ============================================================
         OTP VERIFY CARD
         ============================================================ -->
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">

                <!-- Card -->
                <div class="otp-card card shadow-sm border-0 rounded-4 overflow-hidden">

                    <!-- Header gradient -->
                    <div class="otp-card-header text-center py-4 px-4">
                        <div class="otp-icon-wrap mb-3">
                            <i class="fas fa-envelope-open-text fa-2x text-white"></i>
                        </div>
                        <h4 class="fw-bold text-white mb-1">Xác thực Email</h4>
                        <p class="text-white-50 small mb-0">Nhập mã 6 số đã gửi tới hộp thư của bạn</p>
                    </div>

                    <div class="card-body px-4 py-4">

                        <!-- Email display -->
                        <div class="text-center mb-3">
                            <span class="badge bg-light text-dark border px-3 py-2" style="font-size:0.9rem;">
                                <i class="fas fa-envelope me-1 text-primary"></i>
                                <span id="emailDisplay">—</span>
                            </span>
                        </div>

                        <!-- Flash messages -->
                        <div th:if="${error}"
                            class="alert alert-danger alert-dismissible d-flex align-items-center gap-2 py-2"
                            role="alert">
                            <i class="fas fa-times-circle"></i>
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close btn-close-sm ms-auto"
                                data-bs-dismiss="alert"></button>
                        </div>
                        <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 py-2"
                            role="alert">
                            <i class="fas fa-check-circle"></i>
                            <span th:text="${success}"></span>
                        </div>
                        <div th:if="${warning}" class="alert alert-warning d-flex align-items-center gap-2 py-2"
                            role="alert">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span th:text="${warning}"></span>
                        </div>
                        <div th:if="${infoMsg}" class="alert alert-info d-flex align-items-center gap-2 py-2"
                            role="alert">
                            <i class="fas fa-info-circle"></i>
                            <span th:text="${infoMsg}"></span>
                        </div>

                        <!-- JS-driven alert -->
                        <div id="jsAlert" class="d-none mb-3"></div>

                        <!-- OTP Form -->
                        <form method="post" th:action="@{/verify-otp}" id="otpForm">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="email" id="emailInput" />

                            <!-- 6 OTP boxes -->
                            <div class="otp-boxes d-flex justify-content-center gap-2 mb-3" id="otpBoxes">
                                <input class="otp-input form-control text-center fw-bold fs-4 rounded-3" type="text"
                                    name="otp1" id="otp1" maxlength="1" inputmode="numeric" pattern="[0-9]"
                                    autocomplete="one-time-code">
                                <input class="otp-input form-control text-center fw-bold fs-4 rounded-3" type="text"
                                    name="otp2" id="otp2" maxlength="1" inputmode="numeric" pattern="[0-9]">
                                <input class="otp-input form-control text-center fw-bold fs-4 rounded-3" type="text"
                                    name="otp3" id="otp3" maxlength="1" inputmode="numeric" pattern="[0-9]">
                                <input class="otp-input form-control text-center fw-bold fs-4 rounded-3" type="text"
                                    name="otp4" id="otp4" maxlength="1" inputmode="numeric" pattern="[0-9]">
                                <input class="otp-input form-control text-center fw-bold fs-4 rounded-3" type="text"
                                    name="otp5" id="otp5" maxlength="1" inputmode="numeric" pattern="[0-9]">
                                <input class="otp-input form-control text-center fw-bold fs-4 rounded-3" type="text"
                                    name="otp6" id="otp6" maxlength="1" inputmode="numeric" pattern="[0-9]">
                            </div>

                            <!-- Countdown timer -->
                            <div class="text-center mb-3">
                                <small class="text-muted">
                                    <i class="fas fa-clock me-1"></i>
                                    Mã hết hạn sau: <span id="countdown" class="fw-bold text-danger">05:00</span>
                                </small>
                            </div>

                            <!-- Submit button -->
                            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="verifyBtn">
                                <span id="verifyText"><i class="fas fa-shield-alt me-2"></i>Xác thực</span>
                                <span id="verifySpinner" class="spinner-border spinner-border-sm d-none"
                                    role="status"></span>
                            </button>
                        </form>

                        <!-- Resend -->
                        <div class="text-center">
                            <p class="text-muted small mb-2">Không nhận được mã?</p>
                            <button type="button" class="btn btn-outline-secondary btn-sm px-4" id="resendBtn" disabled>
                                <i class="fas fa-redo me-1"></i>
                                <span id="resendBtnText">Gửi lại sau <span id="resendTimer">30</span>s</span>
                            </button>
                        </div>

                        <!-- Divider + links -->
                        <hr class="my-3">
                        <div class="text-center small text-muted">
                            <a href="/register" class="text-decoration-none me-3">
                                <i class="fas fa-arrow-left me-1"></i>Đổi email khác
                            </a>
                            <a href="#" data-bs-toggle="modal" data-bs-target="#loginModal"
                                class="text-decoration-none">
                                <i class="fas fa-sign-in-alt me-1"></i>Đăng nhập
                            </a>
                        </div>
                    </div>
                </div><!-- /card -->

                <!-- Tips box -->
                <div class="alert alert-light border mt-3 small text-muted" role="alert">
                    <i class="fas fa-lightbulb text-warning me-1"></i>
                    <strong>Không thấy email?</strong> Kiểm tra thư mục <em>Spam / Junk</em>.
                    Mã có hiệu lực trong <strong>5 phút</strong>.
                </div>

            </div><!-- /col -->
        </div><!-- /row -->

        <!-- ============================================================
         STYLES
         ============================================================ -->
        <style>
            /* Gradient header */
            .otp-card-header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }

            /* Icon badge */
            .otp-icon-wrap {
                width: 56px;
                height: 56px;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto;
                backdrop-filter: blur(4px);
            }

            /* Individual OTP input box */
            .otp-input {
                width: 52px !important;
                height: 60px !important;
                border: 2px solid #dee2e6;
                color: #4f3cc9;
                font-size: 1.6rem !important;
                transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
                padding: 0 !important;
                caret-color: transparent;
            }

            .otp-input:focus {
                border-color: #667eea;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
                transform: scale(1.08);
                color: #4f3cc9;
            }

            .otp-input.filled {
                border-color: #667eea;
                background-color: #f0f4ff;
                color: #4f3cc9;
            }

            .otp-input.is-invalid {
                border-color: #dc3545;
                animation: shake 0.4s;
            }

            /* Shake animation for wrong OTP */
            @keyframes shake {

                0%,
                100% {
                    transform: translateX(0);
                }

                20%,
                60% {
                    transform: translateX(-5px);
                }

                40%,
                80% {
                    transform: translateX(5px);
                }
            }

            /* Responsive */
            @media (max-width: 480px) {
                .otp-input {
                    width: 42px !important;
                    height: 50px !important;
                    font-size: 1.3rem !important;
                }
            }
        </style>

        <!-- ============================================================
         JAVASCRIPT
         ============================================================ -->
        <script>
            document.addEventListener('DOMContentLoaded', function () {

                // ── 1. Email từ server ──────────────────────────────────────
                const serverEmailEl = document.getElementById('serverEmail');
                const emailFromServer = serverEmailEl ? serverEmailEl.dataset.email : '';
                const emailFromUrl = new URLSearchParams(window.location.search).get('email') || '';
                const email = (emailFromServer && emailFromServer.trim() !== '')
                    ? emailFromServer : emailFromUrl;

                document.getElementById('emailInput').value = email;
                document.getElementById('emailDisplay').textContent = email || '(chưa xác định)';

                // ── 2. OTP input auto-focus & keyboard handling ─────────────
                const inputs = Array.from(document.querySelectorAll('.otp-input'));

                inputs.forEach((input, idx) => {
                    // Chỉ cho số
                    input.addEventListener('keypress', e => {
                        if (!/[0-9]/.test(e.key)) { e.preventDefault(); return; }
                    });

                    input.addEventListener('input', e => {
                        const val = input.value.replace(/\D/g, '');
                        input.value = val.slice(-1); // Chỉ giữ 1 ký tự

                        if (input.value) {
                            input.classList.add('filled');
                            // Nhảy sang ô tiếp theo
                            if (idx < inputs.length - 1) inputs[idx + 1].focus();
                        } else {
                            input.classList.remove('filled');
                        }
                    });

                    input.addEventListener('keydown', e => {
                        if (e.key === 'Backspace' && !input.value && idx > 0) {
                            inputs[idx - 1].focus();
                            inputs[idx - 1].value = '';
                            inputs[idx - 1].classList.remove('filled');
                        }
                        // Arrow keys
                        if (e.key === 'ArrowLeft' && idx > 0) inputs[idx - 1].focus();
                        if (e.key === 'ArrowRight' && idx < inputs.length - 1) inputs[idx + 1].focus();
                    });
                });

                // ── 3. Paste handler ────────────────────────────────────────
                document.getElementById('otpBoxes').addEventListener('paste', e => {
                    e.preventDefault();
                    const pasted = (e.clipboardData || window.clipboardData)
                        .getData('text').replace(/\D/g, '').slice(0, 6);
                    pasted.split('').forEach((ch, i) => {
                        if (inputs[i]) {
                            inputs[i].value = ch;
                            inputs[i].classList.add('filled');
                        }
                    });
                    const nextEmpty = inputs.findIndex(inp => !inp.value);
                    (inputs[nextEmpty >= 0 ? nextEmpty : inputs.length - 1]).focus();
                });

                // Auto focus ô đầu
                if (inputs[0]) inputs[0].focus();

                // ── 4. Form submit validation ───────────────────────────────
                const form = document.getElementById('otpForm');
                const verifyBtn = document.getElementById('verifyBtn');
                const verifyText = document.getElementById('verifyText');
                const verifySpinner = document.getElementById('verifySpinner');

                form.addEventListener('submit', function (e) {
                    const filled = inputs.filter(i => i.value.trim() !== '');
                    if (filled.length < 6) {
                        e.preventDefault();
                        inputs.forEach(i => i.classList.add('is-invalid'));
                        setTimeout(() => inputs.forEach(i => i.classList.remove('is-invalid')), 600);
                        showJsAlert('danger', 'Vui lòng nhập đủ 6 chữ số!');
                        return;
                    }
                    // Show loading
                    verifyText.classList.add('d-none');
                    verifySpinner.classList.remove('d-none');
                    verifyBtn.disabled = true;
                });

                // ── 5. Countdown timer (5 phút) ─────────────────────────────
                let totalSeconds = 5 * 60; // 300 giây
                const countdownEl = document.getElementById('countdown');

                const timer = setInterval(() => {
                    totalSeconds--;
                    if (totalSeconds <= 0) {
                        clearInterval(timer);
                        countdownEl.textContent = '00:00';
                        countdownEl.classList.remove('text-danger');
                        countdownEl.classList.add('text-muted');
                        showJsAlert('warning',
                            '⏰ Mã OTP đã hết hạn. Vui lòng nhấn "Gửi lại OTP" để nhận mã mới.');
                        verifyBtn.disabled = true;
                    } else {
                        const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
                        const s = String(totalSeconds % 60).padStart(2, '0');
                        countdownEl.textContent = `${m}:${s}`;
                        // Đổi màu khi còn < 60s
                        if (totalSeconds < 60) {
                            countdownEl.classList.add('text-danger');
                        }
                    }
                }, 1000);

                // ── 6. Resend OTP cooldown (30s) ────────────────────────────
                const resendBtn = document.getElementById('resendBtn');
                const resendBtnText = document.getElementById('resendBtnText');
                const resendTimerEl = document.getElementById('resendTimer');
                let resendCooldown = 30;

                // Bắt đầu đếm ngược cho phép resend
                const cooldownInterval = setInterval(() => {
                    resendCooldown--;
                    resendTimerEl.textContent = resendCooldown;
                    if (resendCooldown <= 0) {
                        clearInterval(cooldownInterval);
                        resendBtn.disabled = false;
                        resendBtnText.innerHTML = '<i class="fas fa-redo me-1"></i>Gửi lại OTP';
                    }
                }, 1000);

                // Xử lý click Gửi lại
                resendBtn.addEventListener('click', async function () {
                    if (!email) {
                        showJsAlert('danger', 'Không xác định được email. Vui lòng quay lại đăng ký.');
                        return;
                    }

                    resendBtn.disabled = true;
                    resendBtnText.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Đang gửi...';

                    try {
                        const res = await fetch('/resend-otp', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: 'email=' + encodeURIComponent(email)
                        });
                        const data = await res.json();

                        if (data.success) {
                            showJsAlert('success', ' ' + data.message);
                            // Reset countdown về 5 phút
                            totalSeconds = 5 * 60;
                            // Reset resend cooldown
                            let newCooldown = 30;
                            resendBtnText.innerHTML = `Gửi lại sau <span id="resendTimer">${newCooldown}</span>s`;

                            const newInterval = setInterval(() => {
                                newCooldown--;
                                const el = document.getElementById('resendTimer');
                                if (el) el.textContent = newCooldown;
                                if (newCooldown <= 0) {
                                    clearInterval(newInterval);
                                    resendBtn.disabled = false;
                                    resendBtnText.innerHTML = '<i class="fas fa-redo me-1"></i>Gửi lại OTP';
                                }
                            }, 1000);
                        } else {
                            showJsAlert('danger', '❌ ' + data.message);
                            resendBtn.disabled = false;
                            resendBtnText.innerHTML = '<i class="fas fa-redo me-1"></i>Gửi lại OTP';
                        }
                    } catch (err) {
                        showJsAlert('danger', 'Lỗi mạng. Vui lòng thử lại.');
                        resendBtn.disabled = false;
                        resendBtnText.innerHTML = '<i class="fas fa-redo me-1"></i>Gửi lại OTP';
                    }
                });

                // ── 7. Helper: hiện JS alert ────────────────────────────────
                function showJsAlert(type, msg) {
                    const el = document.getElementById('jsAlert');
                    el.className = `alert alert-${type} d-flex align-items-center gap-2 py-2`;
                    const icons = {
                        success: 'check-circle', danger: 'times-circle',
                        warning: 'exclamation-triangle', info: 'info-circle'
                    };
                    el.innerHTML = `<i class="fas fa-${icons[type] || 'info-circle'}"></i>${msg}`;
                    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });
        </script>

    </th:block>
</body>

</html>
