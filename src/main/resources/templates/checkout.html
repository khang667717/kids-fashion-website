<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(view='checkout')}">
<head>
    <title>Thanh Toán - Kids Fashion</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="row justify-content-center mb-5">
        <div class="col-md-8 col-lg-6">
            <!-- Header -->
            <div class="text-center mb-4 pb-3 border-bottom">
                <h1 class="display-6 fw-normal text-uppercase m-0" style="letter-spacing: 0.05em;">Thanh Toán An Toàn</h1>
            </div>
            
            <div class="bg-light p-4 p-md-5">
                <h5 class="text-uppercase fw-bold mb-4" style="letter-spacing: 0.05em; font-size: 0.95rem;">Thông Tin Giao Hàng</h5>
                
                <form method="post" th:action="@{/checkout/place-order}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    
                    <div class="mb-4">
                        <label for="phone" class="form-label text-uppercase text-muted small" style="letter-spacing: 0.05em;">Số điện thoại liên hệ</label>
                        <input type="tel" class="form-control border-0 shadow-none rounded-0 py-2 bg-white" id="phone" name="phone" placeholder="Nhập số điện thoại người nhận" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="address" class="form-label text-uppercase text-muted small" style="letter-spacing: 0.05em;">Địa chỉ nhận hàng chi tiết</label>
                        <textarea class="form-control border-0 shadow-none rounded-0 py-2 bg-white" id="address" name="address" rows="3" placeholder="Ví dụ: Số nhà, Tên đường, Phường/Xã, Quận/Huyện, Tỉnh/Thành phố" required></textarea>
                    </div>

                    <div class="d-flex align-items-center justify-content-between text-muted small mb-4 py-3 border-top border-bottom border-white">
                        <span><i class="fas fa-truck me-2"></i> Phí Giao Hàng Tiêu Chuẩn</span>
                        <span class="text-success text-uppercase fw-bold">Miễn Phí</span>
                    </div>

                    <div class="d-flex flex-column gap-3 mt-5">
                        <button type="submit" class="btn btn-dark rounded-0 py-3 text-uppercase fw-bold" style="letter-spacing: 0.1em; font-size: 0.85rem;">Xác Nhận & Đặt Hàng</button>
                        <a href="/cart" class="btn btn-outline-dark rounded-0 py-3 text-uppercase" style="letter-spacing: 0.1em; font-size: 0.85rem;">Kiểm Tra Lại Giỏ Hàng</a>
                    </div>
                </form>
            </div>
            
            <div class="text-center mt-4 text-muted small">
                <i class="fas fa-lock me-1"></i> Mọi thông tin thanh toán và địa chỉ của bạn được bảo mật tuyệt đối.
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
