<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(view='checkout')}">
<head>
    <title>Thanh Toán - Kids Fashion</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="row justify-content-center mb-5">
        <div class="col-md-8 col-lg-7">
            <!-- Header -->
            <div class="text-center mb-4 pb-3 border-bottom">
                <h1 class="display-6 fw-normal text-uppercase m-0" style="letter-spacing: 0.05em;">Thanh Toán An Toàn</h1>
            </div>

            <div class="bg-light p-4 p-md-5">
                <h5 class="text-uppercase fw-bold mb-4" style="letter-spacing: 0.05em; font-size: 0.95rem;">
                    <i class="fas fa-map-marker-alt me-2"></i>Chọn Địa Chỉ Giao Hàng
                </h5>

                <form method="post" th:action="@{/checkout/place-order}" id="checkoutForm">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <!-- ===== CÓ ĐỊA CHỈ ĐÃ LƯU ===== -->
                    <div th:if="${not #lists.isEmpty(addresses)}">
                        <div class="d-flex flex-column gap-3 mb-4">
                            <div th:each="addr, iterStat : ${addresses}" class="position-relative">
                                <input type="radio" name="addressId" class="btn-check"
                                       th:id="'addr-' + ${addr.id}"
                                       th:value="${addr.id}"
                                       th:checked="${addr.isDefault}">
                                <label class="btn w-100 text-start p-3 border rounded-3 address-select-card"
                                       th:for="'addr-' + ${addr.id}">
                                    <div class="d-flex justify-content-between align-items-start">
                                        <div>
                                            <div class="fw-bold mb-1">
                                                <i class="fas fa-user me-1 text-muted small"></i>
                                                <span th:text="${addr.fullName}">Tên</span>
                                                <span class="text-muted mx-1">|</span>
                                                <i class="fas fa-phone me-1 text-muted small"></i>
                                                <span th:text="${addr.phone}">SĐT</span>
                                            </div>
                                            <div class="text-muted small mt-1">
                                                <i class="fas fa-map-pin me-1"></i>
                                                <span th:text="${addr.getFullAddress()}">Địa chỉ</span>
                                            </div>
                                        </div>
                                        <div class="d-flex align-items-center gap-2">
                                            <span th:if="${addr.isDefault}" class="badge bg-success rounded-pill small">
                                                <i class="fas fa-check-circle me-1"></i>Mặc định
                                            </span>
                                            <span class="badge bg-light text-dark border rounded-pill small"
                                                  th:text="${addr.label}">HOME</span>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <!-- Link thêm mới -->
                        <div class="text-center mb-4">
                            <a href="/profile/addresses/new" class="text-decoration-none small text-muted">
                                <i class="fas fa-plus-circle me-1"></i>Thêm địa chỉ giao hàng mới
                            </a>
                        </div>
                    </div>

                    <!-- ===== CHƯA CÓ ĐỊA CHỈ ===== -->
                    <div th:if="${#lists.isEmpty(addresses)}" class="text-center py-5">
                        <i class="fas fa-map-marked-alt fa-3x text-muted mb-3 d-block"></i>
                        <p class="text-muted mb-3">Bạn chưa có địa chỉ giao hàng nào.</p>
                        <a href="/profile/addresses/new" class="btn btn-outline-dark rounded-0 py-2 px-4 text-uppercase"
                           style="letter-spacing: 0.05em; font-size: 0.85rem;">
                            <i class="fas fa-plus me-2"></i>Thêm địa chỉ ngay
                        </a>
                    </div>

                    <!-- ===== PHƯƠNG THỨC THANH TOÁN ===== -->
                    <div th:if="${not #lists.isEmpty(addresses)}">
                        <h5 class="text-uppercase fw-bold mb-3 mt-4" style="letter-spacing: 0.05em; font-size: 0.95rem;">
                            <i class="fas fa-credit-card me-2"></i>Phương Thức Thanh Toán
                        </h5>
                        <div class="d-flex flex-column gap-3 mb-4">
                            <div class="position-relative">
                                <input type="radio" name="paymentMethod" value="COD" id="pay-cod" class="btn-check" checked>
                                <label class="btn w-100 text-start p-3 border rounded-3 address-select-card" for="pay-cod">
                                    <div class="d-flex align-items-center">
                                        <i class="fas fa-money-bill-wave fa-2x text-success me-3"></i>
                                        <div>
                                            <div class="fw-bold">Thanh Toán Khi Nhận Hàng (COD)</div>
                                            <div class="text-muted small">Thanh toán bằng tiền mặt khi giao hàng</div>
                                        </div>
                                    </div>
                                </label>
                            </div>
                            <div class="position-relative">
                                <input type="radio" name="paymentMethod" value="VNPAY" id="pay-vnpay" class="btn-check">
                                <label class="btn w-100 text-start p-3 border rounded-3 address-select-card" for="pay-vnpay">
                                    <div class="d-flex align-items-center">
                                        <img src="https://vnpay.vn/wp-content/uploads/2020/07/Logo-VNPAYQR-update.png" alt="VNPAY" style="height: 30px; object-fit: contain;" class="me-3">
                                        <div>
                                            <div class="fw-bold">Thanh Toán Qua VNPAY</div>
                                            <div class="text-muted small">Quét mã QR qua ứng dụng ngân hàng hoặc ví điện tử</div>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="d-flex align-items-center justify-content-between text-muted small mb-4 py-3 border-top border-bottom border-white">
                            <span><i class="fas fa-truck me-2"></i> Phí Giao Hàng Tiêu Chuẩn</span>
                            <span class="text-success text-uppercase fw-bold">Miễn Phí</span>
                        </div>

                        <!-- Thông báo lỗi (Toast-like inline alert) -->
                        <div id="checkoutAlert" class="alert alert-danger d-none" role="alert"></div>

                        <div class="d-flex flex-column gap-3 mt-5">
                            <button type="submit" class="btn btn-dark rounded-0 py-3 text-uppercase fw-bold"
                                    style="letter-spacing: 0.1em; font-size: 0.85rem;"
                                    id="btnPlaceOrder">
                                <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="btnSpinner"></span>
                                <span id="btnText">Xác Nhận &amp; Đặt Hàng</span>
                            </button>
                            <a href="/cart" class="btn btn-outline-dark rounded-0 py-3 text-uppercase"
                               style="letter-spacing: 0.1em; font-size: 0.85rem;">Kiểm Tra Lại Giỏ Hàng</a>
                        </div>
                    </div>
                </form>
            </div>

            <div class="text-center mt-4 text-muted small">
                <i class="fas fa-lock me-1"></i> Mọi thông tin thanh toán và địa chỉ của bạn được bảo mật tuyệt đối.
            </div>
        </div>
    </div>

    <!-- Inline style for address selection cards -->
    <style>
        .address-select-card {
            background: #fff;
            border: 2px solid #e0e0e0 !important;
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .address-select-card:hover {
            border-color: #999 !important;
            background: #fafafa;
        }
        .btn-check:checked + .address-select-card {
            border-color: #212529 !important;
            background: #f8f9fa;
            box-shadow: 0 0 0 1px #212529;
        }
        .btn-check:checked + .address-select-card::after {
            content: '\f058';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 1.2rem;
            color: #198754;
        }
    </style>

    <script>
        document.getElementById('checkoutForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const selectedAddress = document.querySelector('input[name="addressId"]:checked');
            const selectedPayment = document.querySelector('input[name="paymentMethod"]:checked');
            const alertBox = document.getElementById('checkoutAlert');
            const btnSubmit = document.getElementById('btnPlaceOrder');
            const btnSpinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');

            if (!selectedAddress) {
                alertBox.textContent = 'Vui lòng chọn một địa chỉ giao hàng!';
                alertBox.classList.remove('d-none');
                return;
            }

            // Disable button & show spinner
            btnSubmit.disabled = true;
            btnSpinner.classList.remove('d-none');
            btnText.textContent = 'ĐANG XỬ LÝ...';
            alertBox.classList.add('d-none');

            const formData = new FormData();
            formData.append('addressId', selectedAddress.value);
            formData.append('paymentMethod', selectedPayment.value);
            formData.append((document.querySelector('meta[name="_csrf_parameter"]') || {}).content || '_csrf', 
                            document.querySelector('input[name="_csrf"]')?.value);

            try {
                const response = await fetch('/api/payment', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    if (data.paymentUrl) {
                        // Redirect sang cổng VNPay
                        window.location.href = data.paymentUrl;
                    } else if (data.redirectUrl) {
                        // Đặt hàng thành công COD, redirect về danh sách đơn
                        window.location.href = data.redirectUrl;
                    }
                } else {
                    throw new Error(data.error || 'Có lỗi xảy ra khi xử lý đơn hàng');
                }
            } catch (error) {
                alertBox.textContent = error.message;
                alertBox.classList.remove('d-none');
                // Khôi phục nút
                btnSubmit.disabled = false;
                btnSpinner.classList.add('d-none');
                btnText.textContent = 'Xác Nhận & Đặt Hàng';
            }
        });
    </script>
</th:block>
</body>
</html>
