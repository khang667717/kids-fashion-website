spring.application.name=kids-fashion-store

# ===== Database Configuration =====
spring.datasource.url=jdbc:mysql://localhost:3306/kidsfashion?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ===== JPA Configuration =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Hibernate t? ??ng detect dialect, kh�ng c?n khai b�o
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.open-in-view=false

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===== File Upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=${java.io.tmpdir}

# Upload path - S? D?NG ???NG D?N TUY?T ??I
upload.path=${user.dir}/uploads/

# ===== Server Configuration =====
server.port=8080
server.error.path=/error
server.servlet.session.timeout=30m
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Session configuration for cart
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.name=KIDSFASHION_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ===== Static Resources =====
spring.web.resources.cache.cachecontrol.max-age=3600
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.static-locations=classpath:/static/,file:${upload.path}

# ===== Logging Configuration =====
# Spring Security logs
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG

# Application logs
logging.level.com.example.kidsfashion=DEBUG
logging.level.com.example.kidsfashion.controller=DEBUG
logging.level.com.example.kidsfashion.controller.CartController=DEBUG
logging.level.com.example.kidsfashion.service=DEBUG

# Hibernate SQL logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Log pattern hi?n th? th�m th�ng tin
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Log file v?i rotation
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.file.total-size-cap=100MB

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===== DevTools Configuration =====
# T?ng t?c ?? reload
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=400ms

# K�ch ho?t live reload
spring.devtools.livereload.enabled=true
spring.devtools.livereload.port=35729

# Exclude nh?ng th? m?c kh�ng c?n restart
spring.devtools.restart.exclude=static/**,public/**
server.servlet.session.persistent=false

