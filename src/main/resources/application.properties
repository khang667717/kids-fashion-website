spring.application.name=kids-fashion-store

# ===== Database Configuration =====
spring.datasource.url=jdbc:mysql://localhost:3306/kidsfashion?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ===== JPA Configuration =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Hibernate t? ??ng detect dialect, không c?n khai báo
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===== File Upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=${java.io.tmpdir}

# Upload path
upload.path=${user.dir}/uploads/

# ===== Server Configuration =====
server.port=8080
server.servlet.session.timeout=30m
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===== Session =====
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.name=KIDSFASHION_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ===== Static Resources =====
spring.web.resources.cache.cachecontrol.max-age=3600
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.static-locations=classpath:/static/,file:${upload.path}

# ===== Logging =====
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.example.kidsfashion=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Log pattern 
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Log file
logging.file.name=logs/application.log

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info

# ===== DevTools =====
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=400ms
spring.devtools.livereload.enabled=true
spring.devtools.livereload.port=35729
spring.devtools.restart.exclude=static/**,public/**
server.servlet.session.persistent=false

# ===== VNPay Configuration =====
vnp_TmnCode=${VNP_TMN_CODE:}
vnp_HashSecret=${VNP_HASH_SECRET:}
vnp_ReturnUrl=${VNP_RETURN_URL:https://heelless-blanca-lankily.ngrok-free.dev/vnpay-callback}
vnp_PayUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html

# ===== Gmail SMTP – Gửi OTP Email =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8
